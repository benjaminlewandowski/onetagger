name: Build
on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build-linux:
    name: Linux
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rust Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y lld autogen libasound2-dev pkg-config make libssl-dev gcc g++ curl wget git libwebkit2gtk-4.1-dev

      - name: Install NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Build
        run: |
          cd client
          pnpm i
          pnpm run build
          cd ..
          cargo update
          cargo build --release

      - name: Bundle
        run: |
          tar zcf OneTagger-linux.tar.gz -C target/release onetagger
          tar zcf OneTagger-linux-cli.tar.gz -C target/release onetagger-cli
          mkdir dist
          mv OneTagger-linux.tar.gz dist/
          mv OneTagger-linux-cli.tar.gz dist/
    
      - name: Upload Linux
        uses: actions/upload-artifact@v4
        with:
          name: onetagger-linux
          path: dist/OneTagger-linux.tar.gz
    
      - name: Upload Linux CLI
        uses: actions/upload-artifact@v4
        with:
          name: onetagger-linux-cli
          path: dist/OneTagger-linux-cli.tar.gz

  build-win:
    name: Windows
    runs-on: windows-2022
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rust Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install Dependencies
        run: |
          choco install nsis -y
          rustup update

      - name: Build
        run: |
          cd client
          pnpm i
          pnpm run build
          cd ..
          cargo update
          cargo build --release
        
      - name: Bundle
        run: |
          mkdir dist
          powershell -command "(new-object System.Net.WebClient).DownloadFile('https://aka.ms/vs/16/release/vc_redist.x64.exe','vc_redist.x64.exe')"
          powershell -command "(new-object System.Net.WebClient).DownloadFile('https://go.microsoft.com/fwlink/p/?LinkId=2124703','MicrosoftEdgeWebview2Setup.exe')"
          &'C:\Program Files (x86)\NSIS\makensis.exe' 'assets\installer.nsi'
          copy target\release\onetagger.exe dist\OneTagger-windows.exe
          copy target\release\onetagger-cli.exe dist\OneTagger-windows-cli.exe

      - name: Upload Archive
        uses: actions/upload-artifact@v4
        with:
          name: onetagger-win
          path: | 
            dist/OneTagger-windows.exe
    
      - name: Upload Archive Setup
        uses: actions/upload-artifact@v4
        with:
          name: onetagger-win-setup
          path: dist/OneTagger-windows-setup.exe

      - name: Upload CLI
        uses: actions/upload-artifact@v4
        with:
          name: onetagger-win-cli
          path: |
            dist/OneTagger-windows-cli.exe

  build-mac-universal:
    name: macOS Universal
    runs-on: macos-14

    steps:
      - name: Checkout v4
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - name: Rust Cache v4
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-universal-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-bundle
        run: |
          if ! command -v cargo-bundle &> /dev/null; then
            cargo install cargo-bundle --version 0.6.1 --locked
          fi

      - name: Install NodeJS 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm 8
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Build UI via PNPM
        run: |
          cd client
          pnpm i
          pnpm run build
        
      - name: Build macOS Intel & Apple Silicon Architecture Binaries
        run: |
          cargo update
          
          # Build & bundle Intel x86_64
          cargo build --release --target x86_64-apple-darwin
          cargo bundle --release --target x86_64-apple-darwin

          # Build & bundle Apple Silicon
          cargo build --release --target aarch64-apple-darwin
          cargo bundle --release --target aarch64-apple-darwin

      - name: Create Universal Bundle
        run: |
          mkdir dist

          # Copy the ARM64 bundle structure as our foundation
          cp -R target/aarch64-apple-darwin/release/bundle/osx/OneTagger.app .

          # Combine the core GUI binaries inside the bundle
          lipo -create \
            target/x86_64-apple-darwin/release/bundle/osx/OneTagger.app/Contents/MacOS/onetagger \
            target/aarch64-apple-darwin/release/bundle/osx/OneTagger.app/Contents/MacOS/onetagger \
            -output OneTagger.app/Contents/MacOS/onetagger

          # Combine the CLI binaries
          lipo -create \
            target/x86_64-apple-darwin/release/onetagger-cli \
            target/aarch64-apple-darwin/release/onetagger-cli \
            -output onetagger-cli

          # Verify structural architecture matches both
          file OneTagger.app/Contents/MacOS/onetagger
          file onetagger-cli

          chmod +x OneTagger.app/Contents/MacOS/onetagger
          chmod +x onetagger-cli

          # Package your universal distributions
          zip -r dist/OneTagger-mac-universal.zip OneTagger.app
          zip dist/OneTagger-mac-universal-cli.zip onetagger-cli

      - name: Upload Universal Mac App
        uses: actions/upload-artifact@v4
        with:
          name: onetagger-mac-universal
          path: dist/OneTagger-mac-universal.zip

      - name: Upload Universal Mac CLI
        uses: actions/upload-artifact@v4
        with:
          name: onetagger-mac-universal-cli
          path: dist/OneTagger-mac-universal-cli.zip
